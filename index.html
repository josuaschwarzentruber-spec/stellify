<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellify – Dein KI-Karriere-Copilot für die Schweiz</title>
    <!-- THEME INIT: Muss VOR dem React-Bundle laufen um FOUC zu verhindern -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch(e) {}
      })();
    </script>
    <!-- OAUTH POPUP CALLBACK: relay tokens to opener via localStorage (works even when COOP nulls window.opener) -->
    <script>
      (function() {
        try {
          if (!window.opener && !sessionStorage.getItem('stellify_oauth_popup')) return;
          var hash = window.location.hash;
          if (!hash || hash.indexOf('access_token=') === -1) return;
          var params = new URLSearchParams(hash.slice(1));
          var access_token = params.get('access_token');
          var refresh_token = params.get('refresh_token') || '';
          if (!access_token) return;
          // Write to localStorage so any same-origin window picks it up via storage event
          localStorage.setItem('stellify_oauth_result', JSON.stringify({
            access_token: access_token, refresh_token: refresh_token, ts: Date.now()
          }));
          // Also try postMessage for the fast path
          try { window.opener && window.opener.postMessage(
            { type: 'SUPABASE_OAUTH_POPUP_SUCCESS', access_token: access_token, refresh_token: refresh_token },
            window.location.origin
          ); } catch(e2) {}
          window.close();
        } catch(e) {}
      })();
    </script>
    <meta name="description" content="Stellify ist die führende KI-Plattform für Karriere-Optimierung in der Schweiz. CV-Optimierung, Interview-Coach, Gehaltsrechner – auf Deutsch, Französisch und Italienisch.">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Stellify – Dein KI-Karriere-Copilot">
    <meta property="og:description" content="CV-Optimierung, Interview-Coach 
      und Gehaltsrechner für den Schweizer Arbeitsmarkt.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="de_CH">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
